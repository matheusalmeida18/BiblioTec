<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alunos - IEEP BiblioTec</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Poppins', sans-serif; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .fade-in-up { animation: fadeInUp 0.5s ease-out forwards; opacity: 0; transform: translateY(20px); }
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }

        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.05);
        }

        .input-glow:focus { box-shadow: 0 0 15px rgba(99, 102, 241, 0.2); }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 flex h-screen overflow-hidden">

    <aside class="w-72 bg-white text-slate-700 flex flex-col shadow-2xl z-20 relative border-r border-slate-200">
        <div class="p-8 flex items-center justify-center border-b border-slate-200 h-28 bg-slate-50">
            <img src="logo_ieepteca_alta.png" alt="Logo IEEPteca" class="max-w-full h-auto max-h-20 object-contain">
        </div>
        
        <nav class="flex-1 px-4 py-8 space-y-3 overflow-y-auto">
            <a href="index.html" class="flex items-center px-5 py-4 text-slate-500 hover:bg-slate-100 hover:text-indigo-600 rounded-2xl transition-all">
                <i class="fa-solid fa-barcode text-xl w-8"></i>
                <span class="font-medium text-lg ml-2">Empréstimos</span>
            </a>
            <a href="devolucao.html" class="flex items-center px-5 py-4 text-slate-500 hover:bg-slate-100 hover:text-indigo-600 rounded-2xl transition-all">
                <i class="fa-solid fa-box-archive text-xl w-8"></i>
                <span class="font-medium text-lg ml-2">Devoluções</span>
            </a>
            <a href="cadastro_livro.html" class="flex items-center px-5 py-4 text-slate-500 hover:bg-slate-100 hover:text-indigo-600 rounded-2xl transition-all">
                <i class="fa-solid fa-layer-group text-xl w-8"></i>
                <span class="font-medium text-lg ml-2">Acervo (Livros)</span>
            </a>
            <a href="cadastro_aluno.html" class="flex items-center px-5 py-4 bg-indigo-600 rounded-2xl text-white shadow-lg shadow-indigo-500/30 transition-all">
                <i class="fa-solid fa-user-graduate text-xl w-8"></i>
                <span class="font-semibold text-lg ml-2">Alunos</span>
            </a>
            <a href="painel.html" class="flex items-center px-5 py-4 text-slate-500 hover:bg-slate-100 hover:text-indigo-600 rounded-2xl transition-all border-t border-slate-200 mt-4">
                <i class="fa-solid fa-user-shield text-xl w-8"></i>
                <span class="font-medium text-lg ml-2">Painel Admin</span>
            </a>
        </nav>

        <div class="p-6 m-4 bg-slate-50 rounded-2xl border border-slate-200 text-sm text-slate-600">
            <p class="text-xs text-slate-400">Logado como</p>
            <p class="font-bold text-slate-700 tracking-wide">Bibliotecário</p>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-y-auto relative bg-slate-50">
        
        <header class="bg-white/80 backdrop-blur-md shadow-sm px-10 py-6 flex justify-between items-center sticky top-0 z-10">
            <div>
                <h2 class="text-2xl font-bold text-slate-800 tracking-tight">Gestão de Alunos</h2>
                <p class="text-sm text-slate-500 font-medium">Cadastre novos leitores no sistema</p>
            </div>
            <div class="flex items-center bg-indigo-50 px-5 py-2 rounded-full border border-indigo-100 text-indigo-600">
                <i class="fa-regular fa-clock mr-2 text-lg"></i>
                <span id="relogio" class="font-bold text-lg tracking-wider">00:00:00</span>
            </div>
        </header>

        <div class="p-10 flex-1 relative z-10 max-w-5xl mx-auto w-full">
            <div class="absolute top-0 right-0 w-96 h-96 bg-indigo-200 rounded-full filter blur-[120px] opacity-40 -z-10"></div>

            <div class="glass-card rounded-[2rem] p-10 fade-in-up">
                <h3 class="text-2xl font-bold text-slate-800 mb-6 border-b border-slate-100 pb-4">
                    <i class="fa-solid fa-user-plus text-indigo-500 mr-2"></i> Novo Aluno
                </h3>
                
                <div id="mensagem" class="hidden mb-6 p-4 rounded-xl text-center font-bold text-sm shadow-sm border transition-all"></div>

                <form id="formAluno" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="col-span-1 md:col-span-2">
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 ml-1">Nome Completo</label>
                        <input type="text" id="nome" required autofocus placeholder="Ex: João Silva Sauro"
                            class="input-glow w-full px-5 py-4 bg-white border-2 border-slate-200 rounded-xl text-slate-700 font-semibold focus:outline-none focus:border-indigo-500 transition-all">
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 ml-1">Turma / Série</label>
                        <input type="text" id="turma" required placeholder="Ex: 1º Ano A"
                            class="input-glow w-full px-5 py-3 bg-white border-2 border-slate-200 rounded-xl text-slate-700 focus:outline-none focus:border-indigo-500 transition-all">
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 ml-1">Matrícula (Opcional)</label>
                        <input type="text" id="matricula" placeholder="Ex: 2026105"
                            class="input-glow w-full px-5 py-3 bg-white border-2 border-slate-200 rounded-xl text-slate-700 focus:outline-none focus:border-indigo-500 transition-all">
                    </div>

                    <div class="col-span-1 md:col-span-2 mt-4 flex justify-end gap-4">
                        <button type="button" onclick="document.getElementById('formAluno').reset()" class="px-6 py-3 rounded-xl font-bold text-slate-500 hover:bg-slate-100 transition-colors">
                            Limpar
                        </button>
                        <button type="submit" class="px-8 py-3 rounded-xl font-bold text-white bg-indigo-600 hover:bg-indigo-700 shadow-lg shadow-indigo-500/30 transition-all flex items-center">
                            <i class="fa-solid fa-check mr-2"></i> Salvar Aluno
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <footer class="p-6 text-center border-t border-slate-200 bg-white/50 mt-auto">
            <p class="text-sm text-slate-500 font-medium">© 2026 IEEP BiblioTec. Todos os direitos reservados.</p>
            <p class="text-xs text-slate-400 mt-1 font-bold tracking-widest uppercase">
                Desenvolvido Por: 
                <a href="https://www.linkedin.com/in/matheus-almeida-215512bb/" target="_blank" class="text-indigo-600 hover:text-indigo-800 hover:underline transition-colors cursor-pointer">
                    Matheus Almeida
                </a>
            </p>
        </footer>
    </main>

    <script>
        // Relógio
        setInterval(() => { 
            document.getElementById('relogio').innerText = new Date().toLocaleTimeString('pt-BR'); 
        }, 1000);

        // Lógica de Cadastro
        const formAluno = document.getElementById('formAluno');
        const mensagem = document.getElementById('mensagem');

        formAluno.addEventListener('submit', async (e) => {
            e.preventDefault();

            const nome = document.getElementById('nome').value.trim();
            const turma = document.getElementById('turma').value.trim();
            const matricula = document.getElementById('matricula').value.trim();

            try {
                const response = await fetch('https://bibliotec-ltu0.onrender.com/api/alunos', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nome, turma, matricula })
                });

                if (response.ok) {
                    mensagem.className = "mb-6 p-4 rounded-xl text-center font-bold text-sm shadow-sm border block fade-in-up bg-emerald-50 text-emerald-700 border-emerald-200";
                    mensagem.innerHTML = "✅ Aluno cadastrado com sucesso!";
                    formAluno.reset();
                    document.getElementById('nome').focus();
                } else {
                    const errorData = await response.json();
                    mensagem.className = "mb-6 p-4 rounded-xl text-center font-bold text-sm shadow-sm border block fade-in-up bg-red-50 text-red-700 border-red-200";
                    mensagem.innerHTML = `❌ Erro: ${errorData.erro || 'Falha ao cadastrar aluno.'}`;
                }
            } catch (err) {
                mensagem.className = "mb-6 p-4 rounded-xl text-center font-bold text-sm shadow-sm border block fade-in-up bg-red-50 text-red-700 border-red-200";
                mensagem.innerHTML = "❌ Erro de conexão com o servidor. O backend está rodando?";
            }

            // Ocultar mensagem após 4 segundos
            setTimeout(() => {
                mensagem.classList.add('hidden');
            }, 4000);
        });
    </script>
</body>
</html>
