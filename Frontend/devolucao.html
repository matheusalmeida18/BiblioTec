<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Devoluções - IEEP BiblioTec</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Poppins', sans-serif; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .fade-in-up { animation: fadeInUp 0.5s ease-out forwards; opacity: 0; transform: translateY(20px); }
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }

        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.05);
        }

        .input-glow:focus { box-shadow: 0 0 15px rgba(99, 102, 241, 0.2); }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 flex h-screen overflow-hidden">

    <aside class="w-72 bg-white text-slate-700 flex flex-col shadow-2xl z-20 relative border-r border-slate-200">
        <div class="p-8 flex items-center justify-center border-b border-slate-200 h-28 bg-slate-50">
            <img src="logo_ieepteca_alta.png" alt="Logo IEEPteca" class="max-w-full h-auto max-h-20 object-contain">
        </div>
        
        <nav class="flex-1 px-4 py-8 space-y-3 overflow-y-auto">
            <a href="index.html" class="flex items-center px-5 py-4 text-slate-500 hover:bg-slate-100 hover:text-indigo-600 rounded-2xl transition-all">
                <i class="fa-solid fa-barcode text-xl w-8"></i>
                <span class="font-medium text-lg ml-2">Empréstimos</span>
            </a>
            <a href="devolucao.html" class="flex items-center px-5 py-4 bg-indigo-600 rounded-2xl text-white shadow-lg shadow-indigo-500/30 transition-all">
                <i class="fa-solid fa-box-archive text-xl w-8"></i>
                <span class="font-semibold text-lg ml-2">Devoluções</span>
            </a>
            <a href="cadastro_livro.html" class="flex items-center px-5 py-4 text-slate-500 hover:bg-slate-100 hover:text-indigo-600 rounded-2xl transition-all">
                <i class="fa-solid fa-layer-group text-xl w-8"></i>
                <span class="font-medium text-lg ml-2">Acervo (Livros)</span>
            </a>
            <a href="cadastro_aluno.html" class="flex items-center px-5 py-4 text-slate-500 hover:bg-slate-100 hover:text-indigo-600 rounded-2xl transition-all">
                <i class="fa-solid fa-user-graduate text-xl w-8"></i>
                <span class="font-medium text-lg ml-2">Alunos</span>
            </a>
            <a href="painel.html" class="flex items-center px-5 py-4 text-slate-500 hover:bg-slate-100 hover:text-indigo-600 rounded-2xl transition-all border-t border-slate-200 mt-4">
                <i class="fa-solid fa-user-shield text-xl w-8"></i>
                <span class="font-medium text-lg ml-2">Painel Admin</span>
            </a>
        </nav>

        <div class="p-6 m-4 bg-slate-50 rounded-2xl border border-slate-200 text-sm text-slate-600">
            <p class="text-xs text-slate-400">Logado como</p>
            <p class="font-bold text-slate-700 tracking-wide">Bibliotecário</p>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-y-auto relative bg-slate-50">
        
        <header class="bg-white/80 backdrop-blur-md shadow-sm px-10 py-6 flex justify-between items-center sticky top-0 z-10">
            <div>
                <h2 class="text-2xl font-bold text-slate-800 tracking-tight">Receber Material</h2>
                <p class="text-sm text-slate-500 font-medium">Bipe o livro para registrar a devolução no sistema</p>
            </div>
            <div class="flex items-center bg-indigo-50 px-5 py-2 rounded-full border border-indigo-100 text-indigo-600">
                <i class="fa-regular fa-clock mr-2 text-lg"></i>
                <span id="relogio" class="font-bold text-lg tracking-wider">00:00:00</span>
            </div>
        </header>

        <div class="p-10 flex-1 flex justify-center items-start pt-16 relative">
            <div class="absolute top-10 right-32 w-72 h-72 bg-emerald-200 rounded-full filter blur-[100px] opacity-40 -z-10"></div>

            <div class="glass-card w-full max-w-xl rounded-[2.5rem] p-12 relative z-10 fade-in-up">
                <div class="text-center mb-10">
                    <div class="inline-flex items-center justify-center w-20 h-20 rounded-2xl bg-emerald-500 text-white mb-6 shadow-xl shadow-emerald-500/20">
                        <i class="fa-solid fa-box-archive text-4xl"></i>
                    </div>
                    <h3 class="text-4xl font-extrabold text-slate-800">Baixa Rápida</h3>
                </div>

                <div id="mensagem" class="hidden mb-8 p-5 rounded-2xl text-center font-bold text-base shadow-sm border transition-all"></div>

                <div class="space-y-8">
                    <div class="group">
                        <label class="block text-sm font-bold text-slate-500 uppercase tracking-wider mb-3 ml-1 group-focus-within:text-emerald-600">Código da Etiqueta Interna (Tombo)</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none">
                                <i class="fa-solid fa-barcode text-2xl text-slate-400 group-focus-within:text-emerald-500 transition-colors"></i>
                            </div>
                            <input type="text" id="inputLivroDevolucao" placeholder="Bipe o código do livro aqui..." autofocus autocomplete="off"
                                class="input-glow w-full pl-14 pr-5 py-5 bg-white border-2 border-slate-200 rounded-2xl text-slate-700 text-xl font-semibold focus:outline-none focus:border-emerald-500 transition-all shadow-sm">
                        </div>
                    </div>
                </div>

                <div class="mt-8">
                    <button onclick="limparCampo()" class="w-full py-4 px-6 rounded-2xl font-bold text-slate-500 bg-white border-2 border-slate-200 hover:bg-slate-50 hover:text-slate-800 transition-all shadow-sm flex justify-center items-center text-lg">
                        <i class="fa-solid fa-rotate-right mr-3"></i> Limpar / Recomeçar
                    </button>
                </div>
            </div>
        </div>

        <footer class="p-6 text-center border-t border-slate-200 bg-white/50 mt-auto">
            <p class="text-sm text-slate-500 font-medium">© 2026 IEEP BiblioTec. Todos os direitos reservados.</p>
            <p class="text-xs text-slate-400 mt-1 font-bold tracking-widest uppercase">
                Desenvolvido Por: 
                <a href="https://www.linkedin.com/in/matheus-almeida-215512bb/" target="_blank" class="text-indigo-600 hover:text-indigo-800 hover:underline transition-colors cursor-pointer">
                    Matheus Almeida
                </a>
            </p>
        </footer>
    </main>

    <script>
        // Relógio
        setInterval(() => { 
            document.getElementById('relogio').innerText = new Date().toLocaleTimeString('pt-BR'); 
        }, 1000);

        const inputLivro = document.getElementById('inputLivroDevolucao');
        const mensagem = document.getElementById('mensagem');

        // Lógica de Devolução ao apertar 'Enter'
        inputLivro.addEventListener('keypress', async function(e) {
            if (e.key === 'Enter') {
                e.preventDefault(); // Evita que a página recarregue
                const isbn = this.value.trim();
                
                if (!isbn) return;

                // Bloqueia o input enquanto processa
                this.disabled = true;

                try {
                    // Envia requisição para a rota de devolução do backend
                    const response = await fetch('https://bibliotec-ltu0.onrender.com/api/devolucoes', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ isbn })
                    });

                    const resultado = await response.json();

                    if (response.ok) {
                        mensagem.className = "mb-8 p-5 rounded-2xl text-center font-bold text-base shadow-md border block fade-in-up bg-emerald-50 text-emerald-700 border-emerald-200";
                        mensagem.innerHTML = `✅ Livro devolvido com sucesso!<br><span class="text-sm font-normal">O acervo foi atualizado.</span>`;
                        
                        // Limpa o campo para o próximo livro após 2.5 segundos
                        setTimeout(limparCampo, 2500);
                    } else {
                        mensagem.className = "mb-8 p-5 rounded-2xl text-center font-bold text-base shadow-md border block fade-in-up bg-red-50 text-red-700 border-red-200";
                        mensagem.innerHTML = `❌ Erro: ${resultado.erro || 'Não foi possível devolver este livro.'}`;
                        
                        // Limpa o campo em caso de erro também
                        setTimeout(limparCampo, 3500);
                    }
                } catch (err) {
                    mensagem.className = "mb-8 p-5 rounded-2xl text-center font-bold text-base shadow-md border block fade-in-up bg-amber-50 text-amber-700 border-amber-200";
                    mensagem.innerHTML = "⚠️ Erro de conexão com o servidor. Verifique se o backend está rodando.";
                    setTimeout(limparCampo, 3500);
                }
            }
        });

        function limparCampo() {
            inputLivro.value = '';
            inputLivro.disabled = false;
            mensagem.className = 'hidden';
            inputLivro.focus(); // Coloca o cursor de volta automaticamente
        }
    </script>
</body>
</html>
